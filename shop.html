<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cellar | Sam's Wine Winery Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c6a75e;
            --dark: #080808;
            --glass: rgba(255, 255, 255, 0.05);
            --wine-red: #4a0404;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Outfit", sans-serif;
            background: var(--dark);
            color: #fff;
            line-height: 1.6;
        }

        /* ================= SHOP HERO ================= */
        .shop-header {
            padding: 10rem 2rem 4rem;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), var(--dark)), url('images/cellar-bg.jpg') center/cover;
            font-weight :300;
            
        }

        .shop-header h1 {
            font-family: "Outfit", sans-serif;
            font-size: 4rem;
            margin-bottom: 1rem;
            font-weight :400;
        }

        /* ================= FILTERS ================= */
        .filters {
            max-width: 1300px;
            margin: 0 auto 3rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 0 2rem;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* ================= PRODUCT GRID ================= */
        .shop-container {
            max-width: 1300px;
            margin: 0 auto 8rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 3rem;
            padding: 0 2rem;
        }

        .product-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            transition: 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.08);
        }

        .product-image {
            height: 350px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-image img {
            max-height: 100%;
            transition: 0.5s;
        }

        .product-card:hover .product-image img {
            transform: scale(1.05);
        }

        .product-category {
            font-size: 0.7rem;
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .product-title {
           font-family: "Outfit", sans-serif;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight :400;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        .add-to-cart {
            width: 100%;
            padding: 1rem;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .add-to-cart:hover {
            background: var(--gold);
            color: #000;
        }

        /* Badge for limited editions */
        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--wine-red);
            padding: 5px 12px;
            font-size: 0.7rem;
            border-radius: 5px;
        }

        /* ================= MOBILE ================= */
        @media (max-width: 768px) {
            .shop-header h1 { font-size: 2.5rem; }
            .filters { flex-wrap: wrap; gap: 0.5rem; }
        }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <header class="shop-header">
        <h1>The Cellar</h1>
        <p>Curated vintages delivered from our estate to your door.</p>
    </header>

    <div class="filters">
        <button class="filter-btn active">All Wines</button>
        <button class="filter-btn">Red</button>
        <button class="filter-btn">White</button>
        <button class="filter-btn">Sparkling</button>
        <button class="filter-btn">Reserve</button>
    </div>

    <section class="shop-container">
        <article class="product-card">
            <span class="badge">Bestseller</span>
            <div class="product-image">
                <img src="images/RUBY RICH.png" alt="Ruby Rich Red">
            </div>
            <div class="product-category">Red Wine</div>
            <h3 class="product-title">Ruby Rich Reserve</h3>
            
        </article>

        <article class="product-card">
            <div class="product-image">
                <img src="images/JAMUN.png" alt="Jamun Vintage">
            </div>
            <div class="product-category">Specialty</div>
            <h3 class="product-title">Midnight Jamun Vintage</h3>
            
          
        </article>

        <article class="product-card">
            <span class="badge">Rare</span>
            <div class="product-image">
                <img src="images/MAHUA.png" alt="Mahua Wine">
            </div>
            <div class="product-category">Floral</div>
            <h3 class="product-title">Mahua Ancient Spirit</h3>
            
            
        </article>

        <article class="product-card">
            <div class="product-image">
                <img src="images/CRIMSON.png" alt="Crimson Heritage">
            </div>
            <div class="product-category">Heritage Red</div>
            <h3 class="product-title">Crimson Heritage</h3>
            
        </article>
    </section>

    <div id="footer-container"></div>

    <script>
        // Use your existing fetch scripts here for header and footer
        // Copy-paste the script from your wineclub.html
    </script>
</body>
</html>
